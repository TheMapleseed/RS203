name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace --all-targets
      - run: cargo build -p fips203-tunnel --release

  interop:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential netcat-openbsd
      - name: Clone upstream 203 (C reference)
        run: git clone --depth 1 https://github.com/TheMapleseed/203.git _ref-203
      - run: cargo build -p fips203-tunnel --release
      - run: ./scripts/interop_tunnel.sh
      - run: chmod +x scripts/*.sh && ./scripts/interop_rekey.sh
      - run: ./scripts/rust_tunnel_smoke.sh
